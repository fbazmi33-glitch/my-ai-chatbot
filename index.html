<!DOCTYPE html>
<html>
<head>
  <title>My AI Chatbot</title>
</head>
<body>

<h1>My First AI Chatbot</h1>

<input type="text" id="userText" placeholder="Type message...">

<button onclick="reply()">Send</button>

<p id="botReply"></p>

<script>

function reply() {

let message =
document.getElementById("userText").value;

if(message == "hello") {

document.getElementById("botReply").innerText =
"Hi! How are you?";

}

else {

document.getElementById("botReply").innerText =
"I am your AI chatbot";

}

}

</script>

</body>
</html>
