<!DOCTYPE html>
<html>
<head>
  <title>My AI Chatbot</title>
</head>

<body>

<h1>My AI Chatbot 🤖</h1>

<div id="chatbox" style="border:1px solid #ccc; padding:10px; height:300px; overflow:auto;"></div>

<input type="text" id="userText" placeholder="Type message..." />
<button onclick="reply()">Send</button>

<script>

async function reply() {

let msg = document.getElementById("userText").value;
if(msg.trim() === "") return;

let chatbox = document.getElementById("chatbox");

chatbox.innerHTML += "<p><b>You:</b> " + msg + "</p>";

chatbox.innerHTML += "<p id='typing'><i>Bot is typing...</i></p>";

try {

let res = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ inputs: msg })
});

let data = await res.json();

let typing = document.getElementById("typing");
if(typing) typing.remove();

let reply = data.generated_text || "No response";

chatbox.innerHTML += "<p><b>Bot:</b> " + reply + "</p>";

} catch (e) {

document.getElementById("typing").remove();

chatbox.innerHTML += "<p><b>Bot:</b> Error aa gaya 😢</p>";

}

document.getElementById("userText").value = "";

setTimeout(() => {
  chatbox.scrollTop = chatbox.scrollHeight;
}, 100);

}

</script>

</body>
</html>
