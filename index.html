<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI Chatbot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
display:flex;
flex-direction:column;
height:100vh;
color:white;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

#chatbox{
flex:1;
overflow-y:auto;
padding:10px;
}

.user{
background:#2563eb;
padding:12px;
border-radius:12px;
margin:10px;
margin-left:auto;
max-width:80%;
width:fit-content;
}

.bot{
background:#334155;
padding:12px;
border-radius:12px;
margin:10px;
max-width:80%;
width:fit-content;
}

.bottom{
display:flex;
padding:10px;
background:#1e293b;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
padding:12px 20px;
margin-left:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<header>My AI Chatbot 🤖</header>

<div id="chatbox"></div>

<div class="bottom">
<input type="text" id="userText" placeholder="Ask anything...">
<button onclick="reply()">Send</button>
</div>

<script>

// YAHAN APNI OPENROUTER API KEY PASTE KARO
const API_KEY = "PASTE_YOUR_API_KEY_HERE";

async function reply(){

let input = document.getElementById("userText");
let msg = input.value;

if(msg.trim() === "") return;

let chatbox = document.getElementById("chatbox");

// USER MESSAGE
chatbox.innerHTML += `
<div class="user">
${msg}
</div>
`;

input.value = "";

// TYPING MESSAGE
chatbox.innerHTML += `
<div class="bot" id="typing">
Typing...
</div>
`;

chatbox.scrollTop = chatbox.scrollHeight;

try{

const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {

method:"POST",

headers:{
"Authorization":"Bearer " + API_KEY,
"Content-Type":"application/json"
},

body: JSON.stringify({

model:"deepseek/deepseek-chat:free",

messages:[
{
role:"user",
content:msg
}
]

})

});

const data = await response.json();

document.getElementById("typing").remove();

chatbox.innerHTML += `
<div class="bot">
${data.choices[0].message.content}
</div>
`;

chatbox.scrollTop = chatbox.scrollHeight;

}

catch(error){

document.getElementById("typing").innerHTML = "Error 😢";

}

}

</script>

</body>
</html>
