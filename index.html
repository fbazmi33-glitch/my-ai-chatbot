<!DOCTYPE html>
<html>

<head>
  <title>My AI Chatbot</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    #chatbox {
      background: white;
      border-radius: 10px;
      padding: 10px;
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .user {
      color: blue;
      margin: 10px 0;
    }

    .bot {
      color: green;
      margin: 10px 0;
    }

    input {
      width: 75%;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <h1>My AI Chatbot 🤖</h1>

  <div id="chatbox"></div>

  <input type="text" id="userText" placeholder="Type message..." />
  <button onclick="reply()">Send</button>

  <script>

    async function reply() {

      let msg = document.getElementById("userText").value;

      if (msg.trim() === "") return;

      let chatbox = document.getElementById("chatbox");

      chatbox.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;

      chatbox.innerHTML += `<p id="typing"><i>Bot is typing...</i></p>`;

      chatbox.scrollTop = chatbox.scrollHeight;

      try {

        let res = await fetch("https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer hf_demo"
          },
          body: JSON.stringify({
            inputs: msg
          })
        });

        let data = await res.json();

        document.getElementById("typing").remove();

        let botReply = data.generated_text || "I am thinking...";

        chatbox.innerHTML += `<p class="bot"><b>Bot:</b> ${botReply}</p>`;

      } catch (error) {

        document.getElementById("typing").remove();

        chatbox.innerHTML += `<p class="bot"><b>Bot:</b> Error aa gaya 😢</p>`;

      }

      document.getElementById("userText").value = "";

      chatbox.scrollTop = chatbox.scrollHeight;

    }

  </script>

</body>

</html>
