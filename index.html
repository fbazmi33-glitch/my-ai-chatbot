<script>
async function reply() {

let message = document.getElementById("userText").value;

document.getElementById("botReply").innerText = "Thinking... 🤖";

let response = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ inputs: message })
});

let data = await response.json();

let replyText = data.generated_text || "Sorry, I can't reply right now.";

document.getElementById("botReply").innerText = replyText;

}
</script>
