<!DOCTYPE html>
<html>

<head>
  <title>My AI Chatbot</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #chatbox {
      background: white;
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    .user {
      color: blue;
      margin: 10px 0;
    }

    .bot {
      color: green;
      margin: 10px 0;
    }

    input {
      width: 75%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

  <h1>My AI Chatbot 🤖</h1>

  <div id="chatbox"></div>

  <input type="text" id="userText" placeholder="Type message..." />
  <button onclick="reply()">Send</button>

  <script>

    function reply() {

      let msg = document.getElementById("userText").value;

      if (msg.trim() === "") return;

      let chatbox = document.getElementById("chatbox");

      chatbox.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;

      let botReply = "";

      msg = msg.toLowerCase();

      if (msg.includes("hello") || msg.includes("hlo") || msg.includes("hi")) {
        botReply = "Hello 👋 How are you?";
      }

      else if (msg.includes("how are you")) {
        botReply = "I am fine 😊";
      }

      else if (msg.includes("name")) {
        botReply = "I am your AI chatbot 🤖";
      }

      else if (msg.includes("bye")) {
        botReply = "Allah Hafiz 👋";
      }

      else {
        botReply = "Mujhe abhi itna samajh nahi aya 😅";
      }

      chatbox.innerHTML += `<p class="bot"><b>Bot:</b> ${botReply}</p>`;

      document.getElementById("userText").value = "";

      chatbox.scrollTop = chatbox.scrollHeight;
    }

  </script>

</body>

</html>
